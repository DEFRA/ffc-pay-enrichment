---
environment: production
environmentCode: dev
container:
  messageQueueHost: DEVFFCINFSB1001.servicebus.windows.net
  paymentTopicAddress: ffc-pay-request-dev
  paymentSubscriptionAddress: ffc-pay-enrichment
  processingTopicAddress: ffc-pay-processing-dev
  responseTopicAddress: ffc-pay-request-response-dev
  eventsTopicAddress: ffc-pay-events-dev
  customerTopicAddress: ffc-pay-customer-dev
  customerSubscriptionAddress: ffc-pay-enrichment
secretProviderClass:
  azure:
    keyvaultName: DEVFFCINFKV1001
    objects:
      - objectName: devtest-ffcahwr-appInsights-connectionString
        objectType: secret

  secretObjects:
    - secretName: ffc-pay-batch-processor
      type: Opaque
      data:
        - objectName: devtest-ffcahwr-appInsights-connectionString
          key: APPINSIGHTS_CONNECTIONSTRING
