---
environment: production
environmentCode: pre
container:
  messageQueueHost: PREFFCINFSB1001.servicebus.windows.net
  paymentTopicAddress: ffc-pay-request
  paymentSubscriptionAddress: ffc-pay-enrichment
  processingTopicAddress: ffc-pay-processing
  responseTopicAddress: ffc-pay-request-response
  eventsTopicAddress: ffc-pay-events
  customerTopicAddress: ffc-pay-customer
  customerSubscriptionAddress: ffc-pay-enrichment
secretProviderClass:
  azure:
    keyvaultName: PREFFCINFKV1001
    objects:
      - objectName: pre-ffcahwr-appInsights-connectionString
        objectType: secret

  secretObjects:
    - secretName: ffc-pay-batch-processor
      type: Opaque
      data:
        - objectName: pre-ffcahwr-appInsights-connectionString
          key: APPINSIGHTS_CONNECTION_STRING
