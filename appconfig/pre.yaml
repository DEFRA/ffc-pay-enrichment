---
environment: production
environmentCode: pre
container:
  messageQueueHost: PREFFCINFSB1001.servicebus.windows.net
  processingActive: true
  paymentTopicAddress: ffc-pay-request-pre
  paymentSubscriptionAddress: ffc-pay-enrichment
  processingTopicAddress: ffc-pay-processing-pre
  responseTopicAddress: ffc-pay-request-response-pre
  eventsTopicAddress: ffc-pay-events-pre
  customerTopicAddress: ffc-pay-customer-pre
  customerSubscriptionAddress: ffc-pay-enrichment
postgresService:
  postgresDb: ffc-pay-enrichment-pre
  postgresqlHost: preffcdbssq1001.postgres.database.azure.com
  postgresPort: 5432
  postgresSchema: public
secretProviderClass:
  azure:
    keyvaultName: PREFFCINFKV1001
    objects:
      - objectName: pre-ffcahwr-appInsights-connectionString
        objectType: secret
      - objectName: pre-postgresPayEnrichmentUser
        objectType: secret

  secretObjects:
    - secretName: ffc-pay-batch-processor
      type: Opaque
      data:
        - objectName: pre-ffcahwr-appInsights-connectionString
          key: APPINSIGHTS_CONNECTION_STRING
        - objectName: pre-postgresPayEnrichmentUser
          key: POSTGRES_USERNAME